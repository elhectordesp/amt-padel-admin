name: CI — Admin

# Estrategia de deploy del admin panel:
#   - Este workflow valida cada PR (tests + build) y bloquea el merge si falla.
#   - El deploy a producción lo gestiona Vercel directamente mediante su integración
#     GitHub (github.com/apps/vercel). Vercel despliega automáticamente en cada push
#     a main y genera preview deployments para cada PR — sin necesitar un workflow
#     de deploy adicional aquí.
#   - Configurar en Vercel: Settings → Git → Production Branch = main.
#   - Para que Vercel respete el CI: activar "Ignored Build Step" si el CI falla
#     no es necesario — basta con activar branch protection en GitHub con este
#     workflow como required check.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Unit tests
        run: npm run test:cov

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: admin-coverage
          path: coverage/
          retention-days: 7

  build-check:
    name: Build check
    runs-on: ubuntu-latest
    needs: lint-test

    env:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile check
        run: npx tsc --noEmit

      - name: Next.js build
        run: npm run build
